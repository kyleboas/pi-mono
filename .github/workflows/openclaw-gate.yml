name: OpenClaw Gate

on:
  issues:
    types: [opened]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to check'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  check-contributor:
    runs-on: ubuntu-latest
    steps:
      - name: Check contributors
        uses: actions/github-script@v7
        with:
          script: |
            const defaultBranch = context.payload.repository.default_branch;

            async function getTextFile(path) {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: defaultBranch,
              });
              if (!('content' in data) || typeof data.content !== 'string') {
                throw new Error(`Expected file content for ${path}`);
              }
              return Buffer.from(data.content, 'base64').toString('utf8');
            }

            async function isApprovedOrCollaborator(author) {
              try {
                const content = await getTextFile('.github/APPROVED_CONTRIBUTORS');
                const approved = content
                  .split('\n')
                  .map(l => l.trim().toLowerCase())
                  .filter(l => l && !l.startsWith('#'));
                if (approved.includes(author.toLowerCase())) {
                  console.log(`${author} is in APPROVED_CONTRIBUTORS, passing`);
                  return true;
                }
              } catch (err) {
                console.log(`Could not read APPROVED_CONTRIBUTORS: ${err.message}`);
              }

              try {
                const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: author,
                });
                if (['admin', 'maintain', 'write'].includes(perm.permission)) {
                  console.log(`${author} is a collaborator (${perm.permission}), passing`);
                  return true;
                }
              } catch {
                // not a collaborator
              }

              return false;
            }

            async function hasOpenClawActivity(username) {
              try {
                const { data } = await github.rest.search.issuesAndPullRequests({
                  q: `repo:openclaw/openclaw author:${username}`,
                  per_page: 1,
                });
                if (data.total_count > 0) {
                  console.log(`${username} has opened ${data.total_count} issues/PRs on openclaw/openclaw`);
                  return true;
                }
              } catch (err) {
                console.log(`Search failed: ${err.message}`);
              }
              return false;
            }

            async function maybeLabel(number, author) {
              if (author.endsWith('[bot]') || author === 'dependabot[bot]') {
                console.log(`Skipping bot: ${author}`);
                return;
              }

              if (await isApprovedOrCollaborator(author)) return;
              if (!(await hasOpenClawActivity(author))) {
                console.log(`${author} has no openclaw/openclaw activity, passing`);
                return;
              }

              console.log(`${author} has openclaw/openclaw activity, adding label to #${number}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: ['possibly-openclaw-clanker'],
              });
            }

            if (context.payload.issue) {
              await maybeLabel(context.payload.issue.number, context.payload.issue.user.login);
              return;
            }

            const requested = '${{ inputs.pr_number }}'.trim();
            if (requested) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(requested),
              });
              await maybeLabel(pr.number, pr.user.login);
              return;
            }

            for await (const { data: pulls } of github.paginate.iterator(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            })) {
              for (const pr of pulls) {
                await maybeLabel(pr.number, pr.user.login);
              }
            }
